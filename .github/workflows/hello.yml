name: Hello World
on:
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Hello World"
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3
      # Count the number of files in the repository
      - name: Count files
        run: |
          echo "Number of files: $(ls -l | wc -l)"
